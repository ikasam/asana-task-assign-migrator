name: Release

# main への push を起点にリリースを自動化する caller workflow。
# deno.json の version が直前 commit から変化した push のときだけ、reusable な
# release-build.yml を同一 run 内で呼び、tag 作成 → build → GitHub Release を行う。
# 手動 tag push (`on: push: tags`) には依存しない: GITHUB_TOKEN の tag push は
# 他 workflow を `push` で非トリガーにする (C-019) ため、cross-trigger ではなく
# workflow_call で連携する (判断 32-A)。version 不変の push は no-op (R28)。

on:
  push:
    branches: [main]

# リリースは直列化する。進行中の release を後続 push でキャンセルしない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      # before..after の diff を取るため全履歴を取得する。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # deno.json の .version を push の before/after で比較する。
      # force-push や before 不明 (新規 branch の all-zero SHA) は安全側で no-op。
      - name: Check deno.json version change
        id: check
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          new_version="$(jq -r '.version' deno.json)"
          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "no usable 'before' SHA; treating as no-op"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "'before' commit not available (force-push?); treating as no-op"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          old_version="$(git show "${BEFORE}:deno.json" 2>/dev/null | jq -r '.version' 2>/dev/null || true)"
          if [ -n "${new_version}" ] && [ "${new_version}" != "${old_version}" ]; then
            echo "version changed: ${old_version:-<none>} -> ${new_version}"
            {
              echo "changed=true"
              echo "version=${new_version}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "version unchanged (${new_version}); no release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    needs: detect
    if: ${{ needs.detect.outputs.changed == 'true' }}
    permissions:
      # reusable workflow 内の tag push / Release 作成に必要 (caller が付与)。
      contents: write
    uses: ./.github/workflows/release-build.yml
    with:
      version: ${{ needs.detect.outputs.version }}
