name: Workflow Lint

# GitHub Actions ワークフロー自身のメタ検査: actionlint (静的検査) と
# pinact (全 Action が SHA pin 済みかの検証) を実行する。
# deno のコード検査 (test / compile, ci.yml) とは性格が異なるため別ワークフローに
# 分離し、ワークフロー定義か mise.toml (ツール固定) が変わった時だけ走らせる。

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "mise.toml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "mise.toml"

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint-pinact:
    name: actionlint / pinact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # mise.toml で固定した actionlint / pinact / shellcheck を導入する。
      # token は mise の GitHub releases 取得用にこのステップだけへ絞る。
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # actionlint はトークン不要なので env を付けない (露出を最小化)。
      - name: actionlint
        run: mise run actions:lint

      # pinact --verify は GitHub API を叩くため、このステップにだけ token を渡す。
      - name: pinact (verify SHA pins)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: mise run actions:check
