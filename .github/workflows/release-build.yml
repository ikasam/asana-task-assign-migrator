name: Release Build

# main への push で version 変化が検知されたとき、release.yml (caller) から
# workflow_call で呼ばれる reusable workflow。同一 run 内で
# test(品質ゲート) → tag 作成/push → 各 OS バイナリを deno compile → GitHub Release
# を完結させる。GITHUB_TOKEN の tag push は他 workflow を `push` で非トリガーにするが
# (C-019)、本構成は tag push 連鎖に依存しないため影響を受けない。
# 順序の不変条件: test pass → tag push → build → `gh release create --verify-tag`。
# test を tag 作成より前に置くことで、test 失敗時に dangling tag を残さない (S-030)。

on:
  workflow_call:
    inputs:
      version:
        description: "Release version without leading v (例: 0.2.0)。deno.json と一致する。"
        required: true
        type: string

permissions:
  contents: read

env:
  BIN_NAME: asana-task-assign-migrator

jobs:
  prepare:
    name: Quality gate & tag
    runs-on: ubuntu-latest
    permissions:
      # tag の作成・push に必要。
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # mise.toml で固定した deno (= CI test / ローカルと同一バージョン) を導入する。
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install dependencies (verify frozen lockfile)
        run: deno install --frozen

      # 同名 tag / Release が既にあれば二重リリースを避けて fail する (R31/S-032)。
      # 再リリースは deno.json の version bump を要する。tag だけでなく Release も
      # 早期に確認し、test/build を消費した後に gh release create で初めて気付く事態
      # (tag 削除済みで Release だけ残るケース等) を防ぐ。
      - name: Guard against existing tag or release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::tag ${tag} already exists; bump the version in deno.json to release"
            exit 1
          fi
          if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::release ${tag} already exists; bump the version in deno.json to release"
            exit 1
          fi
          echo "tag/release ${tag} is free"

      # 品質ゲート: build/publish の前に CI 相当のチェックを通す (R30 / 判断 34-B)。
      # ここが失敗すると後続の tag 作成に到達せず、dangling tag を残さない。
      - name: Format check
        run: deno task fmt:check
      - name: Lint
        run: deno task lint
      - name: Type check
        run: deno task check
      - name: Test
        run: deno task test

      # test 通過後にだけ tag を作成して push する (順序不変条件)。
      # checkout が設定する GITHUB_TOKEN 認証で push する (contents: write)。
      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      # 1 ターゲットが失敗しても他のビルドは続行する。
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # tag が指す SHA = この workflow の triggering ref (main) と同一。
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install dependencies (verify frozen lockfile)
        run: deno install --frozen

      # windows-msvc ターゲットでは deno compile が出力名に .exe を自動付与する。
      - name: Compile
        run: |
          deno compile \
            --target ${{ matrix.target }} \
            --allow-net=app.asana.com \
            --allow-env=ASANA_ACCESS_TOKEN \
            --allow-read \
            --output "dist/${BIN_NAME}-${{ matrix.target }}" \
            src/main.ts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Releases の作成とアセットのアップロードに必要。
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum "${BIN_NAME}"-* > SHA256SUMS.txt

      # prepare で push 済みの tag を --verify-tag で検証してから Release を作る。
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          tag="v${VERSION}"
          gh release create "${tag}" \
            --repo "${{ github.repository }}" \
            --title "${tag}" \
            --generate-notes \
            --verify-tag \
            dist/*
